version: '3.8'

services:
  bedrock:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - bedrock-data:/data/db
    environment:
      - PORT=8080
      - DB_PATH=/data/db/bedrock.db
      - JWT_SECRET=${JWT_SECRET}
      - INIT_USERNAME=${INIT_USERNAME:-admin}
      - INIT_PASSWORD=${INIT_PASSWORD:-admin123}

volumes:
  bedrock-data:
